<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>joshua lee</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <object class="wallpaper" type="image/svg+xml" data="wallpaper.svg" aria-hidden="true"></object>
    <div class="desktop">
        <div class="windows">
            <div class="win" id="win-left">
                <div class="tabs" id="left-tabs"></div>
                <div class="win-content" id="left-content"></div>
                <div class="statusbar">
                    <span id="left-status">ready</span>
                </div>
            </div>

            <div class="win" id="win-right">
                <div class="win-content" id="right-content"></div>
                <div class="statusbar">
                    <span id="right-status">idle</span>
                    <svg class="mem-diagram" viewBox="0 0 280 24" aria-hidden="true">
                        <defs>
                            <pattern id="dots-dense" width="4" height="4" patternUnits="userSpaceOnUse">
                                <circle cx="2" cy="2" r="1.3" fill="#2a2a2a" />
                            </pattern>
                            <pattern id="dots-sparse" width="6" height="6" patternUnits="userSpaceOnUse">
                                <circle cx="3" cy="3" r="1.3" fill="#2a2a2a" />
                            </pattern>
                        </defs>
                        <rect x="0" y="0" width="56" height="24" />
                        <rect x="60" y="0" width="28" height="24" class="dense" />
                        <rect x="92" y="0" width="28" height="24" class="pad" />
                        <rect x="124" y="0" width="56" height="24" />
                        <rect x="184" y="0" width="12" height="24" class="mid" />
                        <rect x="200" y="0" width="36" height="24" class="pad" />
                        <rect x="240" y="0" width="40" height="24" class="dense" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="scripts.js"></script>
</body>

</html>
