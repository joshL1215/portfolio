<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="80%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <g transform="translate(400,750) scale(2)" fill="none" stroke="#1a1a1a" stroke-width="0.9">

    <!-- globe outline + tilted parallels and meridians, no textures -->
    <g transform="rotate(-18)">
      <!-- equator and parallels (ellipses with shrinking ry) -->
      <ellipse cx="0" cy="0" rx="380" ry="380" stroke-width="1.2"/>
      <ellipse cx="0" cy="0" rx="380" ry="60" stroke-opacity="0.55"/>
      <ellipse cx="0" cy="-110" rx="364" ry="55" stroke-opacity="0.45"/>
      <ellipse cx="0" cy="-210" rx="316" ry="48" stroke-opacity="0.4"/>
      <ellipse cx="0" cy="-290" rx="244" ry="38" stroke-opacity="0.35"/>
      <ellipse cx="0" cy="-345" rx="160" ry="25" stroke-opacity="0.3"/>
      <ellipse cx="0" cy="110" rx="364" ry="55" stroke-opacity="0.45"/>
      <ellipse cx="0" cy="210" rx="316" ry="48" stroke-opacity="0.4"/>
      <ellipse cx="0" cy="290" rx="244" ry="38" stroke-opacity="0.35"/>
      <ellipse cx="0" cy="345" rx="160" ry="25" stroke-opacity="0.3"/>

      <!-- meridians (vertical ellipses rotated) -->
      <ellipse cx="0" cy="0" rx="60" ry="380" stroke-opacity="0.55"/>
      <ellipse cx="0" cy="0" rx="160" ry="380" stroke-opacity="0.45"/>
      <ellipse cx="0" cy="0" rx="260" ry="380" stroke-opacity="0.35"/>
      <ellipse cx="0" cy="0" rx="340" ry="380" stroke-opacity="0.3"/>
    </g>

    <!-- edge / PoP nodes scattered, in 3d-ish positions -->
    <g fill="#1a1a1a" stroke="none">
      <circle cx="-220" cy="-160" r="3"/>
      <circle cx="-60" cy="-220" r="3"/>
      <circle cx="120" cy="-180" r="3"/>
      <circle cx="280" cy="-90" r="3"/>
      <circle cx="-300" cy="40" r="3"/>
      <circle cx="-150" cy="80" r="3"/>
      <circle cx="50" cy="120" r="3"/>
      <circle cx="220" cy="60" r="3"/>
      <circle cx="320" cy="160" r="3"/>
      <circle cx="-100" cy="240" r="3"/>
      <circle cx="120" cy="270" r="3"/>
      <circle cx="-260" cy="-40" r="3"/>
    </g>

    <!-- subtle node halos -->
    <g fill="none" stroke="#1a1a1a" stroke-opacity="0.35">
      <circle cx="-220" cy="-160" r="7"/>
      <circle cx="280" cy="-90" r="7"/>
      <circle cx="-150" cy="80" r="7"/>
      <circle cx="220" cy="60" r="7"/>
      <circle cx="120" cy="270" r="7"/>
    </g>

    <!-- CDN traces: curved arcs between nodes (great-circle illusion) -->
    <g stroke="#1a1a1a" fill="none" stroke-opacity="0.7">
      <path d="M -220 -160 Q -100 -380 280 -90"/>
      <path d="M 280 -90 Q 100 -300 -60 -220"/>
      <path d="M -300 40 Q -180 -260 120 -180"/>
      <path d="M -150 80 Q 40 -200 320 160"/>
      <path d="M 50 120 Q -100 -100 -260 -40"/>
      <path d="M 220 60 Q 350 -200 -60 -220"/>
      <path d="M 120 270 Q -200 200 -300 40"/>
      <path d="M -100 240 Q 200 380 320 160"/>
      <path d="M -260 -40 Q -100 200 120 270"/>
      <path d="M 280 -90 Q 380 80 220 60" stroke-opacity="0.5"/>
      <path d="M -220 -160 Q -350 60 -100 240" stroke-opacity="0.5"/>
    </g>

    <!-- traveling packet pulses along a few arcs -->
    <g fill="#1a1a1a">
      <circle r="3">
        <animateMotion dur="2.6s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0;1" keySplines="0.3 0.05 0.85 0.5"
          path="M -220 -160 Q -100 -380 280 -90"/>
      </circle>
      <circle r="3">
        <animateMotion dur="3s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0;1" keySplines="0.35 0.05 0.9 0.45"
          path="M -300 40 Q -180 -260 120 -180"/>
      </circle>
      <circle r="3">
        <animateMotion dur="3.4s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0;1" keySplines="0.3 0.05 0.85 0.5"
          path="M -150 80 Q 40 -200 320 160"/>
      </circle>
      <circle r="3">
        <animateMotion dur="3.8s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0;1" keySplines="0.4 0.05 0.9 0.45"
          path="M 50 120 Q -100 -100 -260 -40"/>
      </circle>
      <circle r="3">
        <animateMotion dur="3.2s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0;1" keySplines="0.3 0.05 0.85 0.45"
          path="M 220 60 Q 350 -200 -60 -220"/>
      </circle>
      <circle r="3">
        <animateMotion dur="4s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0;1" keySplines="0.35 0.05 0.9 0.5"
          path="M 120 270 Q -200 200 -300 40"/>
      </circle>
    </g>

    <!-- a few outbound rays beyond the globe to imply broader network -->
    <g stroke="#1a1a1a" stroke-opacity="0.35" stroke-dasharray="3 4">
      <line x1="-220" y1="-160" x2="-560" y2="-360"/>
      <line x1="280" y1="-90" x2="640" y2="-220"/>
      <line x1="320" y1="160" x2="700" y2="380"/>
      <line x1="-100" y1="240" x2="-540" y2="430"/>
      <line x1="-300" y1="40" x2="-720" y2="-40"/>
    </g>

  </g>

  <rect x="0" y="0" width="1600" height="1000" fill="url(#vignette)"/>
</svg>
